
name:  Frontend-ecr-ci-cd

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      bump_major:
        description: "Bump MAJOR version?"
        type: boolean
        default: false
      bump_minor:
        description: "Bump MINOR version?"
        type: boolean
        default: false
      bump_patch:
        description: "Bump PATCH version?"
        type: boolean
        default: true
      custom_tag_suffix:
        description: "Optional custom tag suffix (e.g. -dev, -staging)"
        type: string
        default: ""
           

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      ECR_REPOSITORY:  frontend-ecr 
      

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}


      - name: Get latest semantic version for suffix
        id: get-latest
        run: |
          SUFFIX="${{ github.event.inputs.custom_tag_suffix }}"

          TAGS=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --query 'imageDetails[].imageTags[]' \
            --output text 2>/dev/null | tr '\t' '\n' || true)

          if [ -n "$SUFFIX" ]; then
            TAGS=$(echo "$TAGS" | grep -F "$SUFFIX" || true)
          fi

          if [ -z "$TAGS" ]; then
            echo "No tags found for suffix '$SUFFIX'. Starting from 0.0.0"
            LATEST_TAG="0.0.0"
          else
            CLEAN_VERSIONS=$(echo "$TAGS" \
              | sed 's/^v//' \
              | sed -E 's/[^0-9.].*$//' \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true)

            if [ -z "$CLEAN_VERSIONS" ]; then
              LATEST_TAG="0.0.0"
            else
              LATEST_TAG=$(echo "$CLEAN_VERSIONS" | sort -V | tail -n1)
            fi
            echo "Latest numeric version for suffix '$SUFFIX': $LATEST_TAG"
          fi

          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      ############################################################
      # 2️⃣ Validate Version Format
      ############################################################
      - name: Validate version format
        run: |
          if [[ ! "$LATEST_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $LATEST_TAG"
            exit 1
          fi

      ############################################################
      # 3️⃣ Bump Version & Set Custom Tag
      ############################################################
      - name: Bump version and set custom tag
        run: |
          SUFFIX="${{ github.event.inputs.custom_tag_suffix }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"

          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          if [ "${{ github.event.inputs.bump_major }}" == "true" ]; then
            MAJOR=$((MAJOR + 1))
          fi
          if [ "${{ github.event.inputs.bump_minor }}" == "true" ]; then
            MINOR=$((MINOR + 1))
          fi
          if [ "${{ github.event.inputs.bump_patch }}" == "true" ]; then
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          IMAGE_TAG="v$NEW_VERSION$SUFFIX"

          echo "Deploying image with tag: $IMAGE_TAG"

          echo "$IMAGE_TAG" > backend/VERSION
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      ############################################################
      # 4️⃣ Login to ECR
      ############################################################
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: Build Backend image using Docker Compose
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          export DOCKER_BUILDKIT=0
          export IMAGE_TAG=$IMAGE_TAG
          echo "Building backend image with tag: $IMAGE_TAG"
          docker build -t backend:$IMAGE_TAG .
          docker tag backend:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
  